<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>


<!-- LOGIN PAGE -->

<div id="loginPage" class="login-container">

<img class="logo" src="./assets/github-logo.png" alt="">

<h2>GitHub Issues Tracker</h2>

<p class="subtitle">Sign in to manage your issues</p>

<label>Username</label>
<input type="text" id="username" placeholder="Enter Username">
<p class="default">Default: admin</p>

<label>Password</label>
<input type="password" id="password" placeholder="Enter Password">
<p class="default">Default: admin123</p>

<button onclick="login()" class="login-btn">Sign In</button>

<div class="divider"><span>OR</span></div>

<div class="demo-box">
<p class="demo-title">Demo Credentials:</p>
<p><b>Username:</b> admin</p>
<p><b>Password:</b> admin123</p>
</div>

</div>



<!-- MAIN PAGE -->

<div id="mainPage" class="hidden">


<!-- NAVBAR -->

<div class="navbar">

<div class="nav-left">

<img src="./assets/github-logo.png" alt=""> 

<h3>GitHub Issues Tracker</h3>

</div>

<div class="nav-right">

<input type="text" id="searchInput" placeholder="Search issues...">

<button onclick="searchIssue()" class="search-btn">Search</button>

<button class="new-btn">+ New Issue</button>

</div>

</div>



<!-- MAIN CONTENT -->

<div class="main-wrapper">


<!-- TABS -->

<div class="tabs">

<button class="tab active" onclick="showAll(this)">All</button>
<button class="tab" onclick="filterStatus('open',this)">Open</button>
<button class="tab" onclick="filterStatus('closed',this)">Closed</button>

</div>



<!-- ISSUE HEADER -->

<div class="issue-header">

<div class="issue-left">

<div class="issue-icon">
<img src="./assets/Aperture.png" alt="">
</div>

<div>

<h4><span id="issueCount"></span> Issues</h4>

<p>Track and manage your project issues</p>

</div>

</div>


<div class="issue-right">

<span class="dot open-dot"></span> Open
<span class="dot closed-dot"></span> Closed

</div>

</div>


<div id="issuesContainer" class="grid"></div>

</div>

</div>



<!-- MODAL -->

<div id="modal" class="modal hidden">

<div class="modal-content">


<div id="modalBody"></div>

</div>

</div>


<script src="app.js"></script>

</body>
</html>
